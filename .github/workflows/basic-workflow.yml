
name: Basic E-Commerce CI

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4


      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 16


      - name: Install dependencies
        run: npm install


      - name: Build project
        run: npm run build

      - name: Deploy message
        run: echo "Website deployed successfully!"
