name: ecommerce workflow
on:
 push:
   branches: "main"
jobs:

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: setup node.js
        uses: actions/setup-nodev4
        with:
          node-version: '16'

      - name: install dependencies
        run: npm install
      - name: Run tests
        run: npm run build
